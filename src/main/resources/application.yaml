spring:
  application:
    name: compass-uol

  datasource:
    url: jdbc:h2:mem:bancodigitaldb
    driverClassName: org.h2.Driver
    username: sa
    password:

  h2:
    console:
      enabled: true
      path: /h2-console

  jpa:
    show-sql: true
    defer-datasource-initialization: true
    hibernate:
      ddl-auto: update
